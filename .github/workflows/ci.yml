name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    name: Shell checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Bash syntax
        run: bash -n install.sh

      - name: ShellCheck
        run: shellcheck install.sh tests/run.sh tests/install-sandbox.sh scripts/package-release.sh scripts/demo.sh

      - name: Python syntax
        run: python3 -m py_compile scripts/*.py

      - name: Whitespace check
        run: git diff --check

      - name: Unit tests
        run: bash tests/run.sh

      - name: Sandbox install test
        run: bash tests/install-sandbox.sh

      - name: Package release
        run: bash scripts/package-release.sh
